<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="inventar.css">
    <title>TGLogger - Inventar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="topbar">
        <span class="topbar-title">Inventar</span>
        <button class="refresh-btn" id="refreshBtn" onclick="window.location.reload()" aria-label="Liste aktualisieren">
            <svg class="refresh-icon" id="refreshIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
                <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
                <path d="M21 4v4h-4"/>
                <path d="M3 20v-4h4"/>
            </svg>
        </button>
    </div>

    <main class="content">
        <div id="itemList" class="item-list">
            <div class="loading" id="loadingState">
                <div class="spinner"></div>
                <span>Wird geladen…</span>
            </div>
        </div>
    </main>

    <header id="bottomNav">
        <nav>
            <ul>
                <li><a href="info.html">Information</a></li>
                <li><a href="logs.html">Eintragen</a></li>
                <li><a href="home.html">Home</a></li>
                <li><a href="inventar.html">Inventar</a></li>
                <li><a href="settings.html">Einstellungen</a></li>
            </ul>
        </nav>
    </header>

    <script>
        async function loadInventar() {
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('spinning');

            try {
                const res   = await fetch('/inventar-data?t=' + Date.now());
                const text  = await res.text();
                const items = parseCSV(text);
                renderItems(items);
            } catch (e) {
                document.getElementById('itemList').innerHTML =
                    '<p class="empty-hint">Fehler beim Laden.</p>';
            }
            icon.classList.remove('spinning');
        }

        function parseCSV(text) {
            return text.trim().split('\n').slice(1)
                .filter(l => l.trim())
                .map(line => {
                    const cols = splitCSV(line);
                    const raw  = (cols[2] || '').trim().toLowerCase();
                    return {
                        name:         (cols[0] || '').trim(),
                        beschreibung: (cols[1] || '').trim(),
                        status:       (raw === 'ausgeliehen' || raw === 'a') ? 'ausgeliehen' : 'verfügbar',
                        von:          (cols[3] || '').trim(),
                        start:        (cols[4] || '').trim(),
                        ende:         (cols[5] || '').trim(),
                    };
                })
                .filter(i => i.name);
        }

        function splitCSV(line) {
            const result = [];
            let cur = '', inQ = false;
            for (const c of line) {
                if (c === '"') inQ = !inQ;
                else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
                else cur += c;
            }
            result.push(cur);
            return result;
        }

        function renderItems(items) {
            const list = document.getElementById('itemList');
            list.innerHTML = '';
            if (!items.length) {
                list.innerHTML = '<p class="empty-hint">Keine Einträge gefunden.</p>';
                return;
            }
            items.forEach(item => {
                const aus  = item.status === 'ausgeliehen';
                const card = document.createElement('div');
                card.className = 'item-card' + (aus ? ' borrowed' : '');
                let dateInfo = '';
                if (aus) {
                    if (item.von)   dateInfo += `<span class="item-borrower">von ${item.von}</span>`;
                    const parts = [];
                    if (item.start) parts.push('seit ' + item.start);
                    if (item.ende)  parts.push('bis '  + item.ende);
                    if (parts.length) dateInfo += `<span class="item-dates">${parts.join(' — ')}</span>`;
                }
                card.innerHTML = `
                    <div class="item-main">
                        <div class="item-info">
                            <span class="item-name">${item.name}</span>
                            ${item.beschreibung ? `<span class="item-desc">${item.beschreibung}</span>` : ''}
                            ${dateInfo ? `<div class="item-date-row">${dateInfo}</div>` : ''}
                        </div>
                        <span class="item-badge ${aus ? 'badge-out' : 'badge-ok'}">
                            ${aus ? 'Ausgeliehen' : 'Verfügbar'}
                        </span>
                    </div>`;
                list.appendChild(card);
            });
        }

        loadInventar();
    </script>
</body>
</html>
