<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="admin.css">
    <title>TGLogger - Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <div class="topbar">
        <span class="topbar-title">Admin-Modus</span>
        <button class="logout-btn" onclick="logout()">Abmelden</button>
    </div>

    <div class="tab-bar">
        <button class="tab active" id="tab-inventar" onclick="showTab('inventar')">📦 Inventar</button>
        <button class="tab" id="tab-chips"    onclick="showTab('chips')">📡 NFC-Chips</button>
        <button class="tab" id="tab-qr"       onclick="showTab('qr')">🔗 QR-Codes</button>
    </div>

    <!-- ── TAB: INVENTAR ── -->
    <div class="tab-content active" id="content-inventar">
        <button class="import-btn" onclick="importFromSheets()">
            ↓ Aus Google Sheets importieren
        </button>
        <div class="list" id="inventarList">
            <p class="empty">Wird geladen…</p>
        </div>
        <button class="fab" onclick="openForm('inventar-add')">+</button>
    </div>

    <!-- ── TAB: NFC-CHIPS ── -->
    <div class="tab-content" id="content-chips">
        <div class="code-gen-box">
            <p class="code-gen-title">Code Generator</p>
            <p class="code-gen-sub">Gib 5 Ziffern ein → berechnet den gültigen 6-stelligen Code</p>

            <div class="code-digits" id="codeDigits">_ _ _ _ _</div>

            <div class="numpad-grid">
                <button class="npkey" onclick="npType('1')">1</button>
                <button class="npkey" onclick="npType('2')">2</button>
                <button class="npkey" onclick="npType('3')">3</button>
                <button class="npkey" onclick="npType('4')">4</button>
                <button class="npkey" onclick="npType('5')">5</button>
                <button class="npkey" onclick="npType('6')">6</button>
                <button class="npkey" onclick="npType('7')">7</button>
                <button class="npkey" onclick="npType('8')">8</button>
                <button class="npkey" onclick="npType('9')">9</button>
                <button class="npkey npkey-empty"></button>
                <button class="npkey" onclick="npType('0')">0</button>
                <button class="npkey npkey-back" onclick="npBack()">⌫</button>
            </div>

            <div class="code-result" id="codeResult" style="display:none">
                <div class="code-result-code" id="codeResultCode"></div>
                <div class="code-result-hint" id="codeResultHint"></div>
            </div>
        </div>
    </div>

    <!-- ── TAB: QR-CODES ── -->
    <div class="tab-content" id="content-qr">
        <div class="qr-grid">
            <div class="qr-card">
                <p class="qr-label">Log-Liste</p>
                <div id="qr-logs"></div>
                <p class="qr-url">Google Sheets — nur lesen</p>
            </div>
            <div class="qr-card">
                <p class="qr-label">Inventarliste</p>
                <div id="qr-inventar"></div>
                <p class="qr-url">Google Sheets — Schreibzugriff</p>
            </div>
        </div>
    </div>

    <!-- ── INVENTAR ADD FORM ── -->
    <div class="form-overlay" id="formOverlay">
        <div class="form-box">
            <div class="form-header">
                <span class="form-title" id="formTitle">Gegenstand hinzufügen</span>
                <button class="form-close" onclick="closeForm()">✕</button>
            </div>
            <div class="form-body" id="formBody"></div>
            <button class="form-submit" onclick="submitForm()">Speichern</button>
        </div>
    </div>

    <!-- ── BORROW OVERLAY (Airbnb Style) ── -->
    <div class="form-overlay" id="borrowOverlay">
        <div class="form-box">
            <div class="form-header">
                <span class="form-title">Ausleihe eintragen</span>
                <button class="form-close" onclick="closeBorrow()">✕</button>
            </div>
            <div class="form-body">
                <div class="form-field">
                    <label>Ausgeliehen von</label>
                    <div class="fake-input" onclick="openKeyboard('borrow-von')">
                        <span id="borrow-von-text" class="fake-placeholder">Name der Person…</span>
                    </div>
                </div>
                <div class="date-range-row">
                    <div class="form-field" style="flex:1">
                        <label>Von</label>
                        <input class="date-input" type="date" id="borrow-start">
                    </div>
                    <div class="date-range-arrow">→</div>
                    <div class="form-field" style="flex:1">
                        <label>Bis</label>
                        <input class="date-input" type="date" id="borrow-ende">
                    </div>
                </div>
                <div class="date-duration" id="dateDuration"></div>
            </div>
            <button class="form-submit" onclick="submitBorrow()">Ausleihe speichern</button>
        </div>
    </div>

    <!-- ── KEYBOARD OVERLAY ── -->
    <div class="kb-overlay" id="kbOverlay">
        <div class="kb-inputbar">
            <button class="kb-action-btn kb-close" onclick="closeKeyboard()">&#8592;</button>
            <div class="kb-preview" id="kbPreview"></div>
            <button class="kb-action-btn kb-confirm" onclick="confirmKeyboard()">&#10003;</button>
        </div>
        <div class="keyboard">
            <div class="kb-row">
                <button class="kb-key" onclick="kbType('q')">Q</button>
                <button class="kb-key" onclick="kbType('w')">W</button>
                <button class="kb-key" onclick="kbType('e')">E</button>
                <button class="kb-key" onclick="kbType('r')">R</button>
                <button class="kb-key" onclick="kbType('t')">T</button>
                <button class="kb-key" onclick="kbType('z')">Z</button>
                <button class="kb-key" onclick="kbType('u')">U</button>
                <button class="kb-key" onclick="kbType('i')">I</button>
                <button class="kb-key" onclick="kbType('o')">O</button>
                <button class="kb-key" onclick="kbType('p')">P</button>
                <button class="kb-key" onclick="kbType('ü')">Ü</button>
            </div>
            <div class="kb-row">
                <button class="kb-key" onclick="kbType('a')">A</button>
                <button class="kb-key" onclick="kbType('s')">S</button>
                <button class="kb-key" onclick="kbType('d')">D</button>
                <button class="kb-key" onclick="kbType('f')">F</button>
                <button class="kb-key" onclick="kbType('g')">G</button>
                <button class="kb-key" onclick="kbType('h')">H</button>
                <button class="kb-key" onclick="kbType('j')">J</button>
                <button class="kb-key" onclick="kbType('k')">K</button>
                <button class="kb-key" onclick="kbType('l')">L</button>
                <button class="kb-key" onclick="kbType('ö')">Ö</button>
                <button class="kb-key" onclick="kbType('ä')">Ä</button>
            </div>
            <div class="kb-row">
                <button class="kb-key kb-shift" id="shiftBtn" onclick="toggleShift()">&#8679;</button>
                <button class="kb-key" onclick="kbType('y')">Y</button>
                <button class="kb-key" onclick="kbType('x')">X</button>
                <button class="kb-key" onclick="kbType('c')">C</button>
                <button class="kb-key" onclick="kbType('v')">V</button>
                <button class="kb-key" onclick="kbType('b')">B</button>
                <button class="kb-key" onclick="kbType('n')">N</button>
                <button class="kb-key" onclick="kbType('m')">M</button>
                <button class="kb-key" onclick="kbType('-')">-</button>
                <button class="kb-key kb-backspace" onclick="kbBackspace()">&#9003;</button>
            </div>
            <div class="kb-row">
                <button class="kb-key kb-num" onclick="kbType('1')">1</button>
                <button class="kb-key kb-num" onclick="kbType('2')">2</button>
                <button class="kb-key kb-num" onclick="kbType('3')">3</button>
                <button class="kb-key kb-num" onclick="kbType('4')">4</button>
                <button class="kb-key kb-num" onclick="kbType('5')">5</button>
                <button class="kb-key kb-num" onclick="kbType('6')">6</button>
                <button class="kb-key kb-num" onclick="kbType('7')">7</button>
                <button class="kb-key kb-num" onclick="kbType('8')">8</button>
                <button class="kb-key kb-num" onclick="kbType('9')">9</button>
                <button class="kb-key kb-num" onclick="kbType('0')">0</button>
            </div>
            <div class="kb-row">
                <button class="kb-key kb-space" onclick="kbType(' ')">Leerzeichen</button>
            </div>
        </div>
    </div>

    <script>
    // ── AUTH ──────────────────────────────────────────────────────
    if (!sessionStorage.getItem('adminAuth')) window.location.href = 'settings.html';
    function logout() {
        sessionStorage.removeItem('adminAuth');
        window.location.href = 'settings.html';
    }

    // ── TABS ──────────────────────────────────────────────────────
    function showTab(name) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
        document.getElementById('content-' + name).classList.add('active');
    }

    // ── INVENTAR ──────────────────────────────────────────────────
    let inventarItems = [];
    let borrowIdx = null;

    async function loadInventar() {
        try {
            const res = await fetch('/admin/inventar');
            inventarItems = await res.json();
        } catch(e) {
            inventarItems = [];
        }
        renderInventar();
    }

    function renderInventar() {
        const list = document.getElementById('inventarList');
        list.innerHTML = '';
        if (inventarItems.length === 0) {
            list.innerHTML = '<p class="empty">Noch keine Einträge. Oben importieren oder + tippen.</p>';
            return;
        }
        inventarItems.forEach((item, idx) => {
            const aus = item.status === 'ausgeliehen';
            const card = document.createElement('div');
            card.className = 'admin-card' + (aus ? ' borrowed' : '');
            card.innerHTML = `
                <div class="card-main">
                    <div class="card-info">
                        <span class="card-name">${item.name}</span>
                        ${item.beschreibung ? `<span class="card-sub">${item.beschreibung}</span>` : ''}
                        ${aus ? `<span class="card-sub orange">
                            von <b>${item.von || '—'}</b> &nbsp;|&nbsp;
                            ${formatDate(item.start)} → ${formatDate(item.ende)}
                            ${daysLeft(item.ende)}
                        </span>` : ''}
                    </div>
                    <span class="badge ${aus ? 'badge-out' : 'badge-ok'}">${aus ? 'Ausgeliehen' : 'Verfügbar'}</span>
                </div>
                <div class="card-actions">
                    ${aus
                        ? `<button class="action-btn btn-green" onclick="returnItem(${idx})">✓ Zurückgegeben</button>`
                        : `<button class="action-btn btn-orange" onclick="openBorrow(${idx})">→ Ausleihen</button>`
                    }
                    <button class="action-btn btn-red" onclick="deleteInventar(${idx})">Löschen</button>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function formatDate(d) {
        if (!d) return '—';
        // yyyy-mm-dd → dd.mm.yy
        const parts = d.split('-');
        if (parts.length === 3) return `${parts[2]}.${parts[1]}.${parts[0].slice(2)}`;
        return d;
    }

    function daysLeft(ende) {
        if (!ende) return '';
        const diff = Math.ceil((new Date(ende) - new Date()) / 86400000);
        if (diff < 0) return `<b style="color:#d62d2d">(${Math.abs(diff)} Tage überfällig)</b>`;
        if (diff === 0) return '<b>(heute fällig)</b>';
        return `(noch ${diff} Tage)`;
    }

    async function deleteInventar(idx) {
        if (!confirm('Wirklich löschen?')) return;
        await fetch('/admin/inventar/' + idx, { method: 'DELETE' });
        await loadInventar();
    }

    async function returnItem(idx) {
        await fetch('/admin/inventar/' + idx, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: 'verfügbar', von: '', start: '', ende: '' })
        });
        await loadInventar();
    }

    function openBorrow(idx) {
        borrowIdx = idx;
        // Reset form
        document.getElementById('borrow-von-text').textContent = 'Name der Person…';
        document.getElementById('borrow-von-text').classList.add('fake-placeholder');
        document.getElementById('borrow-start').value = new Date().toISOString().split('T')[0];
        document.getElementById('borrow-ende').value = '';
        updateDuration();
        document.getElementById('borrowOverlay').classList.add('open');
    }

    function closeBorrow() {
        document.getElementById('borrowOverlay').classList.remove('open');
        borrowIdx = null;
    }

    function updateDuration() {
        const start = document.getElementById('borrow-start').value;
        const ende  = document.getElementById('borrow-ende').value;
        const el    = document.getElementById('dateDuration');
        if (start && ende) {
            const diff = Math.ceil((new Date(ende) - new Date(start)) / 86400000);
            el.textContent = diff > 0 ? `Dauer: ${diff} Tag${diff === 1 ? '' : 'e'}` : '';
            el.style.color = diff > 0 ? '#00A8E8' : '#d62d2d';
        } else {
            el.textContent = '';
        }
    }

    document.getElementById('borrow-start').addEventListener('change', updateDuration);
    document.getElementById('borrow-ende').addEventListener('change', updateDuration);

    async function submitBorrow() {
        const vonEl = document.getElementById('borrow-von-text');
        const von   = vonEl.classList.contains('fake-placeholder') ? '' : vonEl.textContent.trim();
        const start = document.getElementById('borrow-start').value;
        const ende  = document.getElementById('borrow-ende').value;
        if (!start) return;
        await fetch('/admin/inventar/' + borrowIdx, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: 'ausgeliehen', von, start, ende })
        });
        closeBorrow();
        await loadInventar();
    }

    // Import aus Google Sheets
    async function importFromSheets() {
        const btn = document.querySelector('.import-btn');
        btn.textContent = '⏳ Importiere…';
        btn.disabled = true;
        try {
            const res  = await fetch('/inventar-data?t=' + Date.now());
            const text = await res.text();
            const lines = text.trim().split('\n').slice(1);
            const items = lines.filter(l => l.trim()).map(line => {
                const cols = splitCSV(line);
                const rawStatus = (cols[2] || '').trim().toLowerCase();
                return {
                    name:         (cols[0] || '').trim(),
                    beschreibung: (cols[1] || '').trim(),
                    status:       (rawStatus === 'ausgeliehen' || rawStatus === 'a') ? 'ausgeliehen' : 'verfügbar',
                    von:          (cols[3] || '').trim(),
                    start:        (cols[4] || '').trim(),
                    ende:         (cols[5] || '').trim(),
                };
            }).filter(i => i.name);

            // Bulk speichern ohne Sheet-Sync (Sheet ist ja die Quelle)
            await fetch('/admin/inventar/bulk', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(items)
            });
            await loadInventar();
            btn.textContent = `✓ ${items.length} Einträge importiert`;
        } catch(e) {
            btn.textContent = '✗ Fehler beim Import';
        }
        setTimeout(() => {
            btn.textContent = '↓ Aus Google Sheets importieren';
            btn.disabled = false;
        }, 3000);
    }

    function splitCSV(line) {
        const result = [];
        let cur = '', inQ = false;
        for (const c of line) {
            if (c === '"') inQ = !inQ;
            else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
            else cur += c;
        }
        result.push(cur);
        return result;
    }

    // ── ADD FORM ──────────────────────────────────────────────────
    let currentForm = null;

    function openForm(type) {
        currentForm = type;
        document.getElementById('formBody').innerHTML = `
            <div class="form-field">
                <label>Name</label>
                <div class="fake-input" onclick="openKeyboard('inv-name')">
                    <span id="inv-name-text" class="fake-placeholder">Name des Gegenstands…</span>
                </div>
            </div>
            <div class="form-field">
                <label>Beschreibung</label>
                <div class="fake-input" onclick="openKeyboard('inv-desc')">
                    <span id="inv-desc-text" class="fake-placeholder">z.B. Anzahl, Ort…</span>
                </div>
            </div>
        `;
        document.getElementById('formOverlay').classList.add('open');
    }

    function closeForm() {
        document.getElementById('formOverlay').classList.remove('open');
        currentForm = null;
    }

    async function submitForm() {
        const name = getFormText('inv-name');
        const desc = getFormText('inv-desc');
        if (!name) return;
        await fetch('/admin/inventar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, beschreibung: desc })
        });
        closeForm();
        await loadInventar();
    }

    function getFormText(id) {
        const el = document.getElementById(id + '-text');
        if (!el || el.classList.contains('fake-placeholder')) return '';
        return el.textContent.trim();
    }

    // ── NFC CODE GENERATOR ────────────────────────────────────────
    const SECRET_PHRASE = 'tgloggeristcool'; // gleich wie in nfc_daemon.py
    let npValue = '';

    function npType(d) {
        if (npValue.length >= 5) return;
        npValue += d;
        updateNpDisplay();
    }

    function npBack() {
        npValue = npValue.slice(0, -1);
        updateNpDisplay();
    }

    function updateNpDisplay() {
        const digits = document.getElementById('codeDigits');
        const display = npValue.padEnd(5, '_').split('').join(' ');
        digits.textContent = display;

        const result = document.getElementById('codeResult');
        if (npValue.length === 5) {
            const check = sha256CheckDigit(npValue);
            const fullCode = npValue + check;
            document.getElementById('codeResultCode').textContent = fullCode;
            document.getElementById('codeResultHint').textContent =
                'Auf Chip schreiben: TG:Name:' + fullCode;
            result.style.display = 'block';
        } else {
            result.style.display = 'none';
        }
    }

    // SHA256 Prüfziffer (gleiche Logik wie Python)
    async function sha256CheckDigit(first5) {
        // Synchrone Implementierung via TextEncoder + subtle crypto
        const data = new TextEncoder().encode(first5 + SECRET_PHRASE);
        const hashBuf = await crypto.subtle.digest('SHA-256', data);
        const hashArr = Array.from(new Uint8Array(hashBuf));
        // BigInt aus hex
        const hex = hashArr.map(b => b.toString(16).padStart(2,'0')).join('');
        const big = BigInt('0x' + hex);
        return String(big % 10n);
    }

    // Da sha256 async ist, updateNpDisplay auch async machen
    async function updateNpDisplayAsync() {
        const digits = document.getElementById('codeDigits');
        const display = npValue.padEnd(5, '_').split('').join(' ');
        digits.textContent = display;

        const result = document.getElementById('codeResult');
        if (npValue.length === 5) {
            const check = await sha256CheckDigit(npValue);
            const fullCode = npValue + check;
            document.getElementById('codeResultCode').textContent = fullCode;
            document.getElementById('codeResultHint').textContent =
                'Auf Chip schreiben: TG:Name:' + fullCode;
            result.style.display = 'block';
        } else {
            result.style.display = 'none';
        }
    }

    // Override sync version
    function npType(d) {
        if (npValue.length >= 5) return;
        npValue += d;
        updateNpDisplayAsync();
    }
    function npBack() {
        npValue = npValue.slice(0, -1);
        updateNpDisplayAsync();
    }
    updateNpDisplayAsync();

    // ── QR CODES ──────────────────────────────────────────────────
    function initQR() {
        new QRCode(document.getElementById('qr-logs'), {
            text: 'https://docs.google.com/spreadsheets/d/1e-ALBWNy-vA7xDhyh7MW1McnOO2A0_xoS2Nu02GLB14/edit?usp=sharing',
            width: 220, height: 220, colorDark: '#111', colorLight: '#fff',
            correctLevel: QRCode.CorrectLevel.M
        });
        new QRCode(document.getElementById('qr-inventar'), {
            text: 'https://docs.google.com/spreadsheets/d/1WW_qR45lTtLJuVniZpM87JqKcvrs0GCSEIEKzi_bxa8/edit?usp=sharing',
            width: 220, height: 220, colorDark: '#111', colorLight: '#fff',
            correctLevel: QRCode.CorrectLevel.M
        });
    }

    // ── KEYBOARD ──────────────────────────────────────────────────
    let kbTarget = null, kbValue = '', shiftOn = true;

    function openKeyboard(target) {
        kbTarget = target;
        kbValue  = getFormText(target) || '';
        updateKbPreview();
        document.getElementById('kbOverlay').classList.add('open');
        shiftOn = kbValue.length === 0;
        updateShiftDisplay();
    }
    function closeKeyboard() {
        document.getElementById('kbOverlay').classList.remove('open');
        kbTarget = null;
    }
    function confirmKeyboard() {
        const val = kbValue.trim();
        if (kbTarget) {
            const el = document.getElementById(kbTarget + '-text');
            if (el) {
                el.textContent = val || '';
                el.classList.toggle('fake-placeholder', !val);
                if (!val) el.textContent = el.getAttribute('data-ph') || '…';
            }
        }
        closeKeyboard();
    }
    function kbType(c) {
        kbValue += shiftOn ? c.toUpperCase() : c;
        shiftOn = false;
        updateShiftDisplay();
        updateKbPreview();
    }
    function kbBackspace() { kbValue = kbValue.slice(0,-1); updateKbPreview(); }
    function toggleShift()  { shiftOn = !shiftOn; updateShiftDisplay(); }
    function updateShiftDisplay() { document.getElementById('shiftBtn').classList.toggle('active', shiftOn); }
    function updateKbPreview() {
        const el = document.getElementById('kbPreview');
        el.textContent = kbValue;
        el.classList.toggle('empty', !kbValue);
    }

    // ── INIT ──────────────────────────────────────────────────────
    loadInventar();
    initQR();
    </script>
</body>
</html>
