    <div class="left-clock-wrapper" role="region" aria-label="Uhr und Status">

                <span id="clockHours">00</span><span class="clock-sep">:</span><span id="clockMinutes">00</span>

            <span class="status-dot offline" id="statusDot" aria-hidden="true"></span>

    <aside class="right-panel" role="complementary" aria-label="Rechte Informationsfläche">
        <div class="right-panel-inner">
            <h3>Ereignisse:</h3>
            <div id="events">
            </div>
        </div>

    <script>
const calendarUrl = "https://api.allorigins.win/raw?url=" +
    encodeURIComponent("https://calendar.google.com/calendar/ical/1aa282097260ac607048ed333a2934272bf95e0d24622417da4279c4437440cf%40group.calendar.google.com/public/basic.ics");
const UPDATE_INTERVAL = 2 * 60 * 1000; // 2 Minuten

function loadCalendar() {
    fetch(calendarUrl)
        .then(res => res.text())
        .then(text => {
            const events = parseICS(text);
            const futureEvents = filterFutureEvents(events);
            const container = document.getElementById("events");
            container.innerHTML = "";

            futureEvents.forEach(ev => {
                const p = document.createElement("p");
                p.textContent = `${ev.day}.${ev.month}. - ${ev.title}`;
                container.appendChild(p);
            });
        })
        .catch(err => {
            console.error("Kalender konnte nicht geladen werden:", err);
        });
}

/* iCal Parser */
function parseICS(data) {
    const lines = data.split("\n");
    const events = [];
    let event = null;

    for (let line of lines) {
        line = line.trim();

        if (line === "BEGIN:VEVENT") event = {};
        if (line === "END:VEVENT" && event) {
            if (event.year && event.month && event.day && event.title) {
                events.push(event);
            }
            event = null;
        }

        if (event) {
            if (line.startsWith("SUMMARY:")) {
                event.title = line.replace("SUMMARY:", "");
            }

            if (line.startsWith("DTSTART")) {
                const date = line.split(":")[1];
                event.year  = parseInt(date.substr(0, 4), 10);
                event.month = parseInt(date.substr(4, 2), 10);
                event.day   = parseInt(date.substr(6, 2), 10);
            }
        }
    }

    return events;
}

function filterFutureEvents(events) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    return events
        .filter(ev => {
            const eventDate = new Date(ev.year, ev.month - 1, ev.day);
            return eventDate >= today;
        })
        .sort((a, b) => {
            const da = new Date(a.year, a.month - 1, a.day);
            const db = new Date(b.year, b.month - 1, b.day);
            return da - db;
        });
}

loadCalendar();
setInterval(loadCalendar, UPDATE_INTERVAL);
</script>

    <script>
        (function updateDateTime(){
            const el = document.getElementById('datetime');
            function refresh(){
                if (!el) return;
                const now = new Date();
                el.textContent = now.toLocaleString('de-DE', {weekday: 'short', day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'});
            }
            refresh();
            setInterval(refresh, 60000);
        })();
        (function startFullClock(){
            const h = document.getElementById('clockHours');
            const m = document.getElementById('clockMinutes');
            const s = document.getElementById('clockSeconds');
            function pad(n){ return n.toString().padStart(2,'0'); }
            function tick(){
                const now = new Date();
                if (h) h.textContent = pad(now.getHours());
                if (m) m.textContent = pad(now.getMinutes());
                if (s) s.textContent = pad(now.getSeconds());
            }
            tick();
            setInterval(tick, 1000);
        })();

        (function setupLoginStatus(){
            const nameEl = document.getElementById('statusName');
            const dotEl = document.getElementById('statusDot');

            function fitName(el){
                if (!el) return;
                const parent = el.parentElement;
                const dot = parent.querySelector('.status-dot');
                const text = parent.querySelector('.status-text');
                const parentStyles = window.getComputedStyle(parent);
                const paddingLeft = parseFloat(parentStyles.paddingLeft) || 0;
                const paddingRight = parseFloat(parentStyles.paddingRight) || 0;
                const available = Math.max(40, parent.clientWidth - ((dot ? dot.offsetWidth : 0) + (text ? text.offsetWidth : 0) + paddingLeft + paddingRight + 24));
                const maxSize = 32;
                const minSize = 10;
                for(let fs = maxSize; fs >= minSize; fs -= 0.5){
                    el.style.fontSize = fs + 'px';
                    if (el.scrollWidth <= available) break;
                }
                if (parseFloat(el.style.fontSize) < minSize) el.style.fontSize = minSize + 'px';
            }

            function setStatus(name, online){
                if (nameEl) {
                    nameEl.textContent = name || '';
                    nameEl.style.fontSize = '';
                    requestAnimationFrame(()=> fitName(nameEl));
                }
                if (dotEl) {
                    dotEl.classList.toggle('online', !!online);
                    dotEl.classList.toggle('offline', !online);
                    dotEl.setAttribute('aria-label', online ? 'eingeloggt' : 'nicht eingeloggt');
                }
            }
            setStatus('', true);
            window.addEventListener('resize', ()=> { if (nameEl) fitName(nameEl); });
            window.updateLoginStatus = setStatus;
        })();

        function flash(color) {
            const el = document.getElementById('flashOverlay');
            el.style.background = color;
            el.style.opacity = '0.8';
            setTimeout(() => { el.style.opacity = '0'; }, 600);
        }

        // ── KOMMENTAR BANNER ──────────────────────────────────────────
        const COMMENT_TIMEOUT = 5000; // 5 Sekunden
        let commentTimer = null;
        let commentRafId = null;
        let lastLogoutName = null;

        function showCommentBanner(name) {
            lastLogoutName = name;
            document.getElementById('commentBannerName').textContent = name;
            const banner = document.getElementById('commentBanner');
            const bar    = document.getElementById('commentBannerBar');
            banner.classList.add('show');
            bar.style.transition = 'none';
            bar.style.width = '100%';

            requestAnimationFrame(() => {
                bar.style.transition = `width ${COMMENT_TIMEOUT}ms linear`;
                bar.style.width = '0%';
            });

            clearTimeout(commentTimer);
            commentTimer = setTimeout(() => {
                hideCommentBanner();
            }, COMMENT_TIMEOUT);
        }

        function hideCommentBanner() {
            document.getElementById('commentBanner').classList.remove('show');
            clearTimeout(commentTimer);
            onCommentBannerDone();
        }

        function dismissCommentBanner() {
            hideCommentBanner();
        }

        // ── KEYBOARD FÜR KOMMENTAR ────────────────────────────────────
        let cKbValue = '';
        let cShiftOn = true;

        function openCommentKeyboard() {
            clearTimeout(commentTimer); // Timer pausieren während Tastatur offen ist
            cKbValue = '';
            updateCommentKbPreview();
            document.getElementById('commentKbOverlay').classList.add('open');
            cShiftOn = true;
            updateCommentShiftDisplay();
        }

        function closeCommentKeyboard() {
            document.getElementById('commentKbOverlay').classList.remove('open');
            document.getElementById('commentBanner').classList.remove('show');
            onCommentBannerDone();
        }

        async function confirmCommentKeyboard() {
            const comment = cKbValue.trim();
            const name    = lastLogoutName;
            document.getElementById('commentKbOverlay').classList.remove('open');
            document.getElementById('commentBanner').classList.remove('show');
            onCommentBannerDone();

            if (comment && name) {
                try {
                    await fetch('/nfc_comment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: name, comment: comment })
                    });
                } catch(e) {}
            }
        }

        function commentKbType(c) {
            cKbValue += cShiftOn ? c.toUpperCase() : c;
            cShiftOn = false;
            updateCommentShiftDisplay();
            updateCommentKbPreview();
        }
        function commentKbBackspace() { cKbValue = cKbValue.slice(0,-1); updateCommentKbPreview(); }
        function toggleCommentShift() { cShiftOn = !cShiftOn; updateCommentShiftDisplay(); }
        function updateCommentShiftDisplay() { document.getElementById('commentShiftBtn').classList.toggle('active', cShiftOn); }
        function updateCommentKbPreview() {
            const el = document.getElementById('commentKbPreview');
            el.textContent = cKbValue;
            el.classList.toggle('empty', !cKbValue);
        }

        // ── NFC STATUS POLLING ────────────────────────────────────────
        window._lastActiveSet = [];

        (function pollLoginStatus(){
            async function poll(){
                try {
                    const res    = await fetch('/current_user');
                    const data   = await res.json();
                    const name   = data.name;
                    const active = data.active || [];
                    const prevActive = window._lastActiveSet;

                    // Wer ist neu dazugekommen? (Login)
                    const newlyLoggedIn = active.filter(n => !prevActive.includes(n));
                    // Wer ist verschwunden? (Logout)
                    const newlyLoggedOut = prevActive.filter(n => !active.includes(n));

                    if (newlyLoggedIn.length > 0) {
                        flash('rgba(34,197,94,1)');
                        window.updateLoginStatus(name || newlyLoggedIn[newlyLoggedIn.length - 1], true);
                    }

                    if (newlyLoggedOut.length > 0) {
                        flash('rgba(239,68,68,1)');
                        window.updateLoginStatus(name || 'Niemand eingeloggt', !!name);
                        // Für jede ausgeloggte Person den Banner zeigen (nacheinander, falls mehrere)
                        newlyLoggedOut.forEach(n => queueCommentBanner(n));
                    }

                    if (!name && active.length === 0) {
                        window.updateLoginStatus('Niemand eingeloggt', false);
                    }

                    window._lastActiveSet = active;
                } catch(e) {}
            }
            poll();
            setInterval(poll, 1000);
        })();

        // Banner-Warteschlange: falls mehrere Personen kurz hintereinander ausloggen,
        // wird jeder Banner nacheinander angezeigt statt überschrieben zu werden.
        let commentBannerQueue = [];
        let commentBannerBusy = false;

        function queueCommentBanner(name) {
            commentBannerQueue.push(name);
            processCommentBannerQueue();
        }

        function processCommentBannerQueue() {
            if (commentBannerBusy || commentBannerQueue.length === 0) return;
            commentBannerBusy = true;
            const name = commentBannerQueue.shift();
            showCommentBanner(name);
        }

        // Wird aufgerufen wenn ein Banner fertig ist (Timeout, X, oder Kommentar gespeichert)
        function onCommentBannerDone() {
            commentBannerBusy = false;
            setTimeout(processCommentBannerQueue, 400); // kleine Pause zwischen Bannern
        }
    </script>
