<body class="background">

    <div class="left-clock-wrapper" role="region" aria-label="Uhr und Status">
        <div class="full-clock" role="main" aria-label="Große digitale Uhr">
            <div class="clock-line clock-hm" aria-hidden="false">
                <span id="clockHours">00</span><span class="clock-sep">:</span><span id="clockMinutes">00</span>

            <span class="status-dot offline" id="statusDot" aria-hidden="true"></span>

    <aside class="right-panel" role="complementary" aria-label="Rechte Informationsfläche">

            <h3>Ereignisse:</h3>
            <div id="events">
            </div>
        </div>

    <script>
const calendarUrl = "https://api.allorigins.win/raw?url=" +
    encodeURIComponent("https://calendar.google.com/calendar/ical/1aa282097260ac607048ed333a2934272bf95e0d24622417da4279c4437440cf%40group.calendar.google.com/public/basic.ics");
const UPDATE_INTERVAL = 2 * 60 * 1000; // 2 Minuten

function loadCalendar() {
    fetch(calendarUrl)
        .then(res => res.text())
        .then(text => {
            const events = parseICS(text);
            const futureEvents = filterFutureEvents(events);
            const container = document.getElementById("events");
            container.innerHTML = "";

            futureEvents.forEach(ev => {
                const p = document.createElement("p");
                p.textContent = `${ev.day}.${ev.month}. - ${ev.title}`;
                container.appendChild(p);
            });
        })
        .catch(err => {
            console.error("Kalender konnte nicht geladen werden:", err);
        });
}

/* iCal Parser */
function parseICS(data) {
    const lines = data.split("\n");
    const events = [];
    let event = null;

    for (let line of lines) {
        line = line.trim();

        if (line === "BEGIN:VEVENT") event = {};
        if (line === "END:VEVENT" && event) {
            if (event.year && event.month && event.day && event.title) {
                events.push(event);
            }
            event = null;
        }

        if (event) {
            if (line.startsWith("SUMMARY:")) {
                event.title = line.replace("SUMMARY:", "");
            }

            if (line.startsWith("DTSTART")) {
                const date = line.split(":")[1]; // z.B. 20260214 oder 20260214T000000Z
                event.year  = parseInt(date.substr(0, 4), 10);
                event.month = parseInt(date.substr(4, 2), 10);
                event.day   = parseInt(date.substr(6, 2), 10);
            }
        }
    }

    return events;
}

/* Nur zukünftige Termine + Sortierung */
function filterFutureEvents(events) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    return events
        .filter(ev => {
            const eventDate = new Date(ev.year, ev.month - 1, ev.day);
            return eventDate >= today;
        })
        .sort((a, b) => {
            const da = new Date(a.year, a.month - 1, a.day);
            const db = new Date(b.year, b.month - 1, b.day);
            return da - db;
        });
}

/* Initial laden + alle 2 Minuten aktualisieren */
loadCalendar();
setInterval(loadCalendar, UPDATE_INTERVAL);
</script>




    <script>
        (function updateDateTime(){
            const el = document.getElementById('datetime');
            function refresh(){
                if (!el) return;
                const now = new Date();
                el.textContent = now.toLocaleString('de-DE', {weekday: 'short', day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'});
            }
            refresh();
            setInterval(refresh, 60000);
        })();
        (function startFullClock(){
            const h = document.getElementById('clockHours');
            const m = document.getElementById('clockMinutes');
            const s = document.getElementById('clockSeconds');
            function pad(n){ return n.toString().padStart(2,'0'); }
            function tick(){
                const now = new Date();
                if (h) h.textContent = pad(now.getHours());
                if (m) m.textContent = pad(now.getMinutes());
                if (s) s.textContent = pad(now.getSeconds());
            }
            tick();
            setInterval(tick, 1000);
        })();

        // Login status placeholder and helper (for NFC integration)
        (function setupLoginStatus(){
        
            const nameEl = document.getElementById('statusName');
            const dotEl = document.getElementById('statusDot');
            const textEl = document.querySelector('.login-status .status-text');

            function fitName(el){
                if (!el) return;
                const parent = el.parentElement;
                const dot = parent.querySelector('.status-dot');
                const text = parent.querySelector('.status-text');
                // calculate available width for the name (allow some gap + parent padding)
                const parentStyles = window.getComputedStyle(parent);
                const paddingLeft = parseFloat(parentStyles.paddingLeft) || 0;
                const paddingRight = parseFloat(parentStyles.paddingRight) || 0;
                const available = Math.max(40, parent.clientWidth - ((dot ? dot.offsetWidth : 0) + (text ? text.offsetWidth : 0) + paddingLeft + paddingRight + 24));
                const maxSize = 32; // allow larger starting size
                const minSize = 10; // minimum readable size
                for(let fs = maxSize; fs >= minSize; fs -= 0.5){
                    el.style.fontSize = fs + 'px';
                    if (el.scrollWidth <= available) {
                        break;
                    }
                }
                // ensure minimum size if nothing fit
                if (parseFloat(el.style.fontSize) < minSize) el.style.fontSize = minSize + 'px';
            }

            function setStatus(name, online){
                if (nameEl) {
                    nameEl.textContent = name || '';
                    nameEl.style.fontSize = '';
                    // run fitter after layout
                    requestAnimationFrame(()=> fitName(nameEl));
                }
                if (dotEl) {
                    dotEl.classList.toggle('online', !!online);
                    dotEl.classList.toggle('offline', !online);
                    dotEl.setAttribute('aria-label', online ? 'eingeloggt' : 'nicht eingeloggt');
                }
            }
            // placeholder initial state (long name example)
            setStatus('Tim Weiberg', true);

            // re-fit on resize
            window.addEventListener('resize', ()=> { if (nameEl) fitName(nameEl); });

            // Expose updater for NFC integration (global for now)
            window.updateLoginStatus = setStatus;
        })();

        // Flash-Effekt
        function flash(color) {
            const el = document.getElementById('flashOverlay');
            el.style.background = color;
            el.style.opacity = '0.8';
            setTimeout(() => { el.style.opacity = '0'; }, 600);
        }

        // NFC Status polling
        (function pollLoginStatus(){
            async function poll(){
                try {
                    const res  = await fetch('/current_user');
                    const data = await res.json();
                    const name = data.name;
                    const wasLoggedIn = window._lastLoginName;

                    if (name && name !== wasLoggedIn) {
                        flash('rgba(34,197,94,1)');
                        window.updateLoginStatus(name, true);
                    } else if (!name && wasLoggedIn) {
                        flash('rgba(239,68,68,1)');
                        window.updateLoginStatus('Niemand eingeloggt', false);
                    } else if (!name) {
                        window.updateLoginStatus('Niemand eingeloggt', false);
                    }
                    window._lastLoginName = name;
                } catch(e) {}
            }
            poll();
            setInterval(poll, 1000);
        })();
    </script>
